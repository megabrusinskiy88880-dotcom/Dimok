<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кабинет — Бедрок-клад</title>
<link rel="stylesheet" href="/style.css">
<style>
  header.top {
    border-bottom: 1px solid var(--stone-700);
    padding: 20px 0;
    position: sticky;
    top: 0;
    background: rgba(22, 20, 15, 0.92);
    backdrop-filter: blur(8px);
    z-index: 50;
  }
  .top-inner { display: flex; align-items: center; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 10px; font-family: var(--font-display); font-size: 22px; }
  .brand svg { width: 26px; height: 26px; }
  .nav-right { display: flex; align-items: center; gap: 18px; font-size: 14px; }
  .nick-badge { font-family: var(--font-mono); color: var(--gold-bright); }

  .page-head { padding: 44px 0 24px; }
  .page-head h1 { font-size: 36px; }

  .orders-list { display: flex; flex-direction: column; gap: 16px; padding-bottom: 80px; }
  .order-card { display: flex; flex-direction: column; gap: 12px; }
  .order-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
  .order-title { font-family: var(--font-display); font-size: 20px; }
  .order-sub { color: var(--parchment-dim); font-size: 13px; font-family: var(--font-mono); }

  .status-pill {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    white-space: nowrap;
    border: 1px solid;
  }
  .status-pending { color: var(--gold-bright); border-color: var(--gold); background: rgba(201,162,75,0.08); }
  .status-confirmed { color: #7fb2e8; border-color: #5f8cba; background: rgba(95,140,186,0.08); }
  .status-completed { color: var(--ok); border-color: var(--ok); background: rgba(107,138,79,0.08); }
  .status-cancelled { color: var(--danger); border-color: var(--danger); background: rgba(168,64,47,0.08); }

  .coords-box {
    background: var(--stone-950);
    border: 1px dashed var(--gold);
    border-radius: 4px;
    padding: 16px 18px;
    font-family: var(--font-mono);
    font-size: 15px;
    color: var(--gold-bright);
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .coords-waiting {
    color: var(--parchment-dim);
    font-size: 13px;
    font-style: italic;
  }
  .copy-btn {
    background: none;
    border: 1px solid var(--stone-600);
    color: var(--parchment-dim);
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-family: var(--font-mono);
    flex-shrink: 0;
  }
  .copy-btn:hover { border-color: var(--gold); color: var(--gold-bright); }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--parchment-dim); }
  .empty-state svg { width: 48px; height: 48px; opacity: 0.4; margin-bottom: 16px; }

  /* Chat UI */
  .chat-toggle-btn {
    position: fixed; right: 24px; bottom: 24px; z-index: 100;
    width: 60px; height: 60px; border-radius: 50%;
    background: linear-gradient(160deg, var(--gold-bright), var(--gold));
    color: var(--ink); border: none; cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center;
  }
  .chat-toggle-btn svg { width: 28px; height: 28px; }
  .chat-toggle-btn:hover { transform: scale(1.05); }

  .chat-modal {
    position: fixed; right: 24px; bottom: 90px; width: 340px; height: 460px;
    z-index: 100; display: none; flex-direction: column; padding: 0; overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  }
  @media(max-width:400px) {
    .chat-modal { right: 0; bottom: 0; width: 100%; height: 100%; border-radius: 0; }
  }
  .chat-modal.show { display: flex; }
  .chat-head { padding: 16px; border-bottom: 1px solid var(--stone-700); display: flex; justify-content: space-between; align-items: center; background: var(--stone-900); }
  .chat-title { font-family: var(--font-display); font-size: 18px; color: var(--gold-bright); }
  .close-chat { background: none; border: none; color: var(--parchment-dim); font-size: 24px; cursor: pointer; line-height: 1; }
  .chat-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; background: var(--stone-800); }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 8px; font-size: 14px; line-height: 1.4; word-wrap: break-word;}
  .msg.user { align-self: flex-end; background: var(--gold); color: var(--ink); border-bottom-right-radius: 2px; }
  .msg.admin { align-self: flex-start; background: var(--stone-600); color: var(--parchment); border-bottom-left-radius: 2px; }
  .chat-foot { padding: 12px; border-top: 1px solid var(--stone-700); display: flex; gap: 8px; background: var(--stone-900); }
  .chat-foot input { flex: 1; background: var(--stone-950); border: 1px solid var(--stone-600); color: var(--parchment); padding: 8px 12px; border-radius: 4px; }
  .chat-foot input:focus { outline: none; border-color: var(--gold); }
</style>
</head>
<body>

<header class="top">
  <div class="container top-inner">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.3"><path d="M12 2l2.4 6.6L21 11l-6.6 2.4L12 20l-2.4-6.6L3 11l6.6-2.4L12 2z"/></svg>
      Бедрок-клад
    </div>
    <div class="nav-right">
      <span class="nick-badge" id="nickBadge"></span>
      <a href="/shop" class="btn btn-ghost btn-sm">Лавка</a>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">Выйти</button>
    </div>
  </div>
</header>

<div class="container">
  <div class="page-head">
    <span class="eyebrow">твои заявки</span>
    <h1>Кабинет</h1>
  </div>

  <div class="orders-list" id="ordersList">
    <div class="card order-card">
      <div class="skeleton" style="height:20px;width:40%"></div>
      <div class="skeleton" style="height:40px"></div>
    </div>
  </div>
</div>

<button class="chat-toggle-btn" id="chatToggleBtn">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
</button>

<div class="chat-modal card" id="chatModal">
  <div class="chat-head">
    <div class="chat-title">Чат с продавцом</div>
    <button class="close-chat" id="closeChatBtn">×</button>
  </div>
  <div class="chat-body" id="chatMessages">
    <!-- Messages -->
  </div>
  <form class="chat-foot" id="chatForm">
    <input type="text" id="chatInput" placeholder="Сообщение..." autocomplete="off">
    <button type="submit" class="btn btn-primary btn-sm">Отпр.</button>
  </form>
</div>

<div class="toast" id="toast"></div>

<script>
const toast = document.getElementById('toast');
function showToast(msg, isError) {
  toast.textContent = msg;
  toast.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => toast.classList.remove('show'), 3200);
}

const statusLabels = {
  pending: 'Ожидает подтверждения',
  confirmed: 'Подтверждено',
  completed: 'Выдано',
  cancelled: 'Отменено'
};

async function init() {
  const me = await fetch('/api/user/me').then(r => r.json());
  if (!me.loggedIn) { window.location.href = '/'; return; }
  document.getElementById('nickBadge').textContent = me.nickname;
  loadOrders();
}

async function loadOrders() {
  const list = document.getElementById('ordersList');
  try {
    const res = await fetch('/api/user/orders/mine');
    if (res.status === 401) { window.location.href = '/'; return; }
    const orders = await res.json();

    if (orders.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 2l2.4 6.6L21 11l-6.6 2.4L12 20l-2.4-6.6L3 11l6.6-2.4L12 2z"/></svg>
          <div>Заявок пока нет.</div>
          <a href="/shop" class="btn btn-ghost btn-sm" style="margin-top:16px;">В лавку</a>
        </div>`;
      return;
    }

    list.innerHTML = orders.map(renderOrder).join('');

    list.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        navigator.clipboard.writeText(btn.dataset.coords).then(() => {
          showToast('Координаты скопированы');
        });
      });
    });
  } catch (e) {
    list.innerHTML = `<div class="empty-state">Не удалось загрузить заявки. Обнови страницу.</div>`;
  }
}

function renderOrder(o) {
  const date = new Date(o.createdAt).toLocaleString('ru-RU', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });

  let coordsBlock;
  if (o.coords) {
    coordsBlock = `
      <div class="coords-box">
        <span>${escapeHtml(o.coords)}</span>
        <button class="copy-btn" data-coords="${escapeHtml(o.coords)}">Копировать</button>
      </div>`;
  } else if (o.status === 'cancelled') {
    coordsBlock = `<div class="coords-waiting">Заявка отменена.</div>`;
  } else {
    coordsBlock = `<div class="coords-waiting">Координаты появятся здесь после подтверждения заявки.</div>`;
  }

  const note = o.adminNote ? `<div class="order-sub" style="color:var(--parchment-dim); font-style:italic;">${escapeHtml(o.adminNote)}</div>` : '';

  let actionBtns = '';
  if (o.status === 'pending') {
    actionBtns = `<button class="btn btn-ghost btn-sm" style="margin-top:8px; border-color:var(--danger); color:var(--danger);" onclick="cancelOrder('${o.id}')">Отменить заказ</button>`;
  } else if (o.status === 'confirmed') {
    actionBtns = `<button class="btn btn-primary btn-sm" style="margin-top:8px;" onclick="confirmOrder('${o.id}')">Клад найден!</button>`;
  }

  return `
    <div class="card order-card">
      <div class="order-top">
        <div>
          <div class="order-title">${escapeHtml(o.lotTitle)}</div>
          <div class="order-sub">${o.quantity} шт · (по ${escapeHtml(String(o.price))}) · ${date}</div>
        </div>
        <span class="status-pill status-${o.status}">${statusLabels[o.status] || o.status}</span>
      </div>
      ${coordsBlock}
      ${note}
      ${actionBtns ? `<div>${actionBtns}</div>` : ''}
    </div>`;
}

async function cancelOrder(id) {
  if (!confirm('Точно отменить заявку?')) return;
  try {
    const res = await fetch('/api/user/orders/' + id + '/cancel', { method: 'POST' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Ошибка');
    loadOrders();
  } catch(e) {
    showToast(e.message, true);
  }
}

async function confirmOrder(id) {
  if (!confirm('Подтверждаешь, что клад найден?')) return;
  try {
    const res = await fetch('/api/user/orders/' + id + '/confirm', { method: 'POST' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Ошибка');
    loadOrders();
  } catch(e) {
    showToast(e.message, true);
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/api/user/logout', { method: 'POST' });
  window.location.href = '/';
});

// Chat Logic
const chatToggleBtn = document.getElementById('chatToggleBtn');
const chatModal = document.getElementById('chatModal');
const closeChatBtn = document.getElementById('closeChatBtn');
const chatMessages = document.getElementById('chatMessages');
const chatForm = document.getElementById('chatForm');
const chatInput = document.getElementById('chatInput');
let chatPolling = null;
let lastMsgCount = 0;

chatToggleBtn.addEventListener('click', () => {
  chatModal.classList.add('show');
  loadChat();
  chatPolling = setInterval(loadChat, 3000);
});
closeChatBtn.addEventListener('click', () => {
  chatModal.classList.remove('show');
  clearInterval(chatPolling);
});

async function loadChat() {
  try {
    const res = await fetch('/api/user/chat');
    const data = await res.json();
    if (data.ok) renderChat(data.messages);
  } catch (e) {}
}
function renderChat(messages) {
  if (messages.length === 0) {
    chatMessages.innerHTML = '<div class="muted center">Нет сообщений. Напишите продавцу!</div>';
    return;
  }
  const isScrolledToBottom = chatMessages.scrollHeight - chatMessages.clientHeight <= chatMessages.scrollTop + 1;
  const newHTML = messages.map(m => `<div class="msg ${m.sender}">${escapeHtml(m.text)}</div>`).join('');
  if (chatMessages.innerHTML !== newHTML) {
    chatMessages.innerHTML = newHTML;
    if (messages.length > lastMsgCount || isScrolledToBottom) {
       chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    lastMsgCount = messages.length;
  }
}
chatForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = chatInput.value;
  if (!text.trim()) return;
  chatInput.value = '';
  await fetch('/api/user/chat', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({text}) });
  loadChat();
});

init();
</script>
</body>
</html>
